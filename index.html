<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPF2 Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Load File from Disk</h1>
    
    <div class="controls">
      <button id="loadBtn">📂 Load File from Disk</button>
      <input type="file" id="fileInput" style="display: none;" multiple>
      <div id="loadedFiles" aria-live="polite"></div>
      <div class="view-mode-controls" role="group" aria-label="Raw content view mode">
        <button id="singleViewBtn" class="view-mode-btn active" type="button">Single File</button>
        <button id="multiViewBtn" class="view-mode-btn" type="button">Multiple View</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="raw">Raw Content</button>
      <button class="tab-btn" data-tab="chart">DESC + Chart</button>
    </div>

    <section id="tab-raw" class="tab-panel active">
      <textarea id="textArea" placeholder="File content will appear here..."></textarea>
      <div id="rawEditActions" class="raw-edit-actions hidden">
        <button id="keepEditedFileBtn" class="raw-edit-btn" type="button">Keep Current File</button>
        <button id="createEditedFileBtn" class="raw-edit-btn" type="button">Create New File</button>
        <button id="discardEditedFileBtn" class="raw-edit-btn" type="button">Discard Draft</button>
      </div>
      <div id="rawSplitView" class="raw-split-view hidden" aria-live="polite"></div>
    </section>

    <section id="tab-chart" class="tab-panel">
      <div class="analytics">
        <article class="card desc-card">
          <div class="desc-title-row">
            <h2>DESC</h2>
            <input id="descSearchInput" type="search" placeholder="Search ID or name" aria-label="Search DESC values">
          </div>
          <div id="descPanel">Load a file to show DESC.</div>
          <div id="descSelector" style="display: none;">
            <div class="selector-header">
              <label for="descValueSelect">Visualize:</label>
              <button id="selectorToggleBtn" class="selector-toggle" title="Toggle view">⊞</button>
            </div>
            <select id="descValueSelect"></select>
          </div>
        </article>

        <article class="card chart-card">
          <div class="chart-title-row">
            <h2>Chart</h2>
            <div class="chart-title-actions">
              <button id="stepToggleBtn" class="chart-toggle-btn" type="button">Step Diagram: OFF</button>
              <button id="compareToggleBtn" class="chart-toggle-btn" type="button">All Files: OFF</button>
            </div>
          </div>
          <div id="chartInfo">Load a file to generate the chart.</div>
          <div id="chartArea" role="img" aria-label="Line chart"></div>
        </article>
      </div>
    </section>
  </div>

  <div id="fileActionModal" class="file-action-modal hidden" aria-hidden="true">
    <div class="file-action-card" role="dialog" aria-modal="true" aria-labelledby="fileActionTitle">
      <h3 id="fileActionTitle">File action</h3>
      <div class="file-action-row" id="fileActionButtons">
        <button id="actionRenameBtn" type="button" class="modal-btn">Rename</button>
        <button id="actionRecolorBtn" type="button" class="modal-btn">Recolor</button>
        <button id="actionDeleteBtn" type="button" class="modal-btn">Delete</button>
      </div>
      <div class="file-color-row hidden" id="fileColorChoices">
        <button type="button" class="color-choice" data-color="#ffd166" aria-label="Yellow"></button>
        <button type="button" class="color-choice" data-color="#90e0ef" aria-label="Blue"></button>
        <button type="button" class="color-choice" data-color="#0f766e" aria-label="Green"></button>
      </div>
      <button id="actionCloseBtn" type="button" class="modal-close">Close</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="script.js"></script>
</body>
</html>
